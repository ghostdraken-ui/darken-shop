<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Add Product</title>
  <link rel="stylesheet" href="addproductstyle.css">
</head>
<body>

<header class="navbar">
  <div class="logo">🛍️ MyShop</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
  </div>
</header>

<main class="container">
  <h1>Add Product</h1>

  <form id="addForm" enctype="multipart/form-data">
    <p><input id="name" name="name" placeholder="Product name" required></p>
    <p><input id="price" name="price" type="number" step="0.01" placeholder="Price" required></p>
    <p><input id="image" name="image" type="file" accept="image/*" required></p>
    <p><button type="submit">Add Product</button></p>
  </form>

  <section class="my-products">
    <div class="section-title">
      <h2>Your Products</h2>
      <button id="refreshProducts" type="button">Refresh</button>
    </div>
    <p id="productStatus" class="status-text">Loading your products...</p>
    <div id="myProducts" class="my-products-grid"></div>
  </section>

</main>

<script>
const token = localStorage.getItem('token');
const productStatus = document.getElementById('productStatus');
const myProducts = document.getElementById('myProducts');

function setProductStatus(message, isError = false) {
  productStatus.textContent = message;
  productStatus.className = isError ? 'status-text error' : 'status-text';
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function money(value) {
  return Number(value || 0).toLocaleString('en-KE', {
    style: 'currency',
    currency: 'KES'
  });
}

async function readJsonResponse(res) {
  const text = await res.text();

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    throw new Error('Server returned a web page instead of JSON. Start/restart the backend with: cd backend && node server.js');
  }
}

document.getElementById('addForm').addEventListener('submit', function(e){
  e.preventDefault();

  if(!token){
    alert('Please log in to add a product');
    window.location.href = 'login.html';
    return;
  }

  const fd = new FormData();
  fd.append('name', document.getElementById('name').value);
  fd.append('price', document.getElementById('price').value);
  const file = document.getElementById('image').files[0];
  if(file) fd.append('image', file);

  fetch('/add-product', {
    method: 'POST',
    headers: {
      'authorization': token
    },
    body: fd
  })
  .then(async res => {
    const data = await readJsonResponse(res);
    if (!res.ok) {
      throw new Error(data.error || 'Failed to add product');
    }
    return data;
  })
  .then(data => {
    alert(data.message || "Product added successfully");
    document.getElementById('addForm').reset();
    loadMyProducts();
  })
  .catch(err => {
    console.error(err);
    alert("Failed to add product");
  });
});

async function loadMyProducts() {
  if (!token) {
    setProductStatus('Please log in to see your products.', true);
    myProducts.innerHTML = '';
    return;
  }

  try {
    setProductStatus('Loading your products...');
    const res = await fetch('/my-products', {
      headers: {
        authorization: token
      }
    });
    const products = await readJsonResponse(res);

    if (!res.ok) {
      throw new Error(products.error || 'Failed to load your products');
    }

    if (!products.length) {
      myProducts.innerHTML = '';
      setProductStatus('You have not added any products yet.');
      return;
    }

    myProducts.innerHTML = products.map(product => `
      <article class="my-product">
        <img src="/uploads/${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">
        <div>
          <h3>${escapeHtml(product.name)}</h3>
          <p>${money(product.price)}</p>
          <button type="button" onclick="removeMyProduct('${product._id}')">Remove</button>
        </div>
      </article>
    `).join('');
    setProductStatus(`${products.length} product${products.length === 1 ? '' : 's'} added by you.`);
  } catch (err) {
    console.error(err);
    setProductStatus(err.message || 'Failed to load your products.', true);
  }
}

async function removeMyProduct(id) {
  if (!token || !confirm('Remove this product?')) return;

  try {
    const res = await fetch(`/my-products/${id}`, {
      method: 'DELETE',
      headers: {
        authorization: token
      }
    });
    const data = await readJsonResponse(res);

    if (!res.ok) {
      throw new Error(data.error || 'Failed to remove product');
    }

    setProductStatus(data.message);
    loadMyProducts();
  } catch (err) {
    console.error(err);
    setProductStatus(err.message || 'Failed to remove product.', true);
  }
}

document.getElementById('refreshProducts').addEventListener('click', loadMyProducts);
loadMyProducts();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="loginstyle.css">
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <p class="input-row"><input id="u" placeholder="Username"></p>
    <p class="input-row"><input id="p" type="password" placeholder="Password"></p>
    <button onclick="login()">Login</button>
    <p class="signup-note">No account? <a href="register.html">Register</a></p>
    <p class="forgot-password"><a href="#" >Forgot password</a></p>
</div>

<script>
function login(){
fetch("http://localhost:3000/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:u.value,
password:p.value
})
})
.then(res=>res.json())
.then(data=>{
localStorage.setItem("token",data.token);
alert("Login success");

// ✅ IMPORTANT FIX: go to shop page
window.location.href="index.html";
});
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="loginstyle.css">
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <p class="input-row"><input id="u" placeholder="Username"></p>
    <p class="input-row"><input id="p" type="password" placeholder="Password"></p>
    <button onclick="login()">Login</button>
    <p class="signup-note">No account? <a href="register.html">Register</a></p>
    <p class="forgot-password"><a href="#" >Forgot password</a></p>
</div>

<script>
function login(){
  if (!u.value || !p.value) {
    alert("Username and password required");
    return;
  }

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      password:p.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
    } else if (data.token) {
      localStorage.setItem("token", data.token);
      alert("Login successful");
      window.location.href="index.html";
    }
  })
  .catch(err => {
    console.error(err);
    alert("Login failed");
  });
}
</script>

</body>
</html>

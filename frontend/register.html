<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="registerstyle.css">
</head>
<body>

<div class="register">
<h2>Register</h2>

<p class="input-row"><input id="u" placeholder="Username"></p>
<p class="input-row"><input id="ph" type="tel" placeholder="phone number" oninput="formatPhoneNumber(this)"></p>
<p class="input-row"><input id="p" type="password" placeholder="Password"></p>
<p class="input-row"><input id="cp" type="password" placeholder="Confirm Password"></p>
<p class="show-password"><input type="checkbox" id="showPass" onclick="togglePassword('p'); togglePassword('cp')"> Show Password</p>

<button onclick="register()">Register</button>

<p class="login-note">Already have an account? <a href="login.html">Login</a></p>
</div>

<script>

function formatPhoneNumber(input) {
  let value = input.value.replace(/\D/g, '');
  if (value.length > 0) {
    if (value.length <= 3) {
      value = value;
    } else if (value.length <= 6) {
      value = `(${value.slice(0, 3)}) ${value.slice(3)}`;
    } else {
      value = `(${value.slice(0, 3)}) ${value.slice(3, 6)}-${value.slice(6, 10)}`;
    }
  }
  input.value = value;
}

function register(){
  if (p.value !== cp.value) {
    alert("Passwords don't match");
    return;
  }

  if (!u.value || !p.value) {
    alert("Username and password required");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      phone:ph.value,
      password:p.value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      alert(data.error);
    } else {
      alert(data.message || "Registration successful");
      window.location.href="login.html";
    }
  })
  .catch(err => {
    console.error(err);
    alert("Registration failed");
  });
}
function togglePassword(id){
const input = document.getElementById(id);
input.type = input.type === 'password' ? 'text' : 'password';
}


</script>

</body>
</html>

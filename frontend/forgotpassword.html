<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="forgotpasswordstyle.css">
</head>
<body>

<div class="login-card">
  <h2>Reset Password</h2>
  <p class="input-row"><input id="u" placeholder="Username"></p>
  <p class="input-row"><input id="ph" type="tel" placeholder="Registered phone number" oninput="formatPhoneNumber(this)"></p>
  <p class="input-row"><input id="p" type="password" placeholder="New password"></p>
  <p class="input-row"><input id="cp" type="password" placeholder="Confirm new password"></p>
  <button onclick="resetPassword()">Reset Password</button>
  <p class="signup-note">Remembered it? <a href="login.html">Login</a></p>
</div>

<script>
function formatPhoneNumber(input) {
  let value = input.value.replace(/\D/g, '');
  if (value.length > 0) {
    if (value.length <= 3) {
      value = value;
    } else if (value.length <= 6) {
      value = `(${value.slice(0, 3)}) ${value.slice(3)}`;
    } else {
      value = `(${value.slice(0, 3)}) ${value.slice(3, 6)}-${value.slice(6, 10)}`;
    }
  }
  input.value = value;
}

async function readJsonResponse(res) {
  const text = await res.text();

  try {
    return text ? JSON.parse(text) : {};
  } catch (err) {
    throw new Error("Server returned a web page instead of JSON. Start the backend with: cd backend && node server.js");
  }
}

async function resetPassword() {
  if (!u.value || !ph.value || !p.value || !cp.value) {
    alert("All fields are required");
    return;
  }

  if (p.value !== cp.value) {
    alert("Passwords don't match");
    return;
  }

  try {
    const res = await fetch("/forgot-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: u.value,
        phone: ph.value,
        password: p.value
      })
    });
    const data = await readJsonResponse(res);

    if (!res.ok) {
      throw new Error(data.error || "Password reset failed");
    }

    alert(data.message || "Password reset successfully");
    window.location.href = "login.html";
  } catch (err) {
    console.error(err);
    alert(err.message || "Password reset failed");
  }
}
</script>

</body>
</html>
